<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - Financial Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 30px;
        }
        .delete-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            margin-top: 50px;
        }
        .warning-icon {
            font-size: 4rem;
            text-align: center;
            color: #dc3545;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 p-0 sidebar">
                <div class="p-4">
                    <h3 class="text-white">💰 FinanceTrack</h3>
                </div>
                <nav>
                    <a href="{% url 'dashboard' %}">📊 Dashboard</a>
                    <a href="{% url 'accounts' %}">🏦 Accounts</a>
                    <a href="{% url 'analytics' %}">📈 Analytics</a>
                    <a href="{% url 'reports' %}">📋 Reports</a>
                    <a href="{% url 'logout' %}">🚪 Logout</a>
                </nav>
            </div>
            
            <!-- Main content -->
            <div class="col-md-10 p-4">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="delete-container">
                            <div class="warning-icon">
                                ⚠️
                            </div>
                            <h3 class="text-center mb-4">Confirm Delete</h3>
                            <p class="text-center mb-4">
                                Are you sure you want to delete the account 
                                <strong>"{{ account.name }}"</strong>?
                            </p>
                            
                            <div class="alert alert-warning">
                                <strong>Warning:</strong> This action cannot be undone. 
                                All transactions associated with this account will also be deleted.
                            </div>
                            
                            <div class="text-center">
                                <form method="post" style="display: inline;">
                                    {% csrf_token %}
                                    <button type="submit" class="btn btn-danger btn-lg">
                                        Yes, Delete Account
                                    </button>
                                </form>
                                <a href="{% url 'accounts' %}" class="btn btn-secondary btn-lg">
                                    Cancel
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
